<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GraphXR Gateway — Pairing Confirmation</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #0f1117;
      color: #e0e0e0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 12px;
      padding: 32px;
      max-width: 420px;
      width: 100%;
      text-align: center;
    }
    h1 { font-size: 20px; margin-bottom: 8px; color: #fff; }
    .subtitle { color: #888; font-size: 14px; margin-bottom: 24px; }
    .info {
      background: #12141c;
      border: 1px solid #2a2d3a;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 24px;
      text-align: left;
    }
    .info-row { margin-bottom: 8px; font-size: 14px; }
    .info-row:last-child { margin-bottom: 0; }
    .label { color: #888; }
    .value { color: #fff; font-weight: 500; }
    .origin-value { color: #5b9cff; word-break: break-all; }
    .buttons { display: flex; gap: 12px; }
    button {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-approve { background: #22c55e; color: #fff; }
    .btn-deny { background: #ef4444; color: #fff; }
    .result { margin-top: 16px; font-size: 14px; }
    .result.success { color: #22c55e; }
    .result.denied { color: #ef4444; }
    .result.error { color: #f59e0b; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Pairing Request</h1>
    <p class="subtitle">An application wants to connect to GraphXR Gateway</p>

    <div class="info">
      <div class="info-row">
        <span class="label">Origin: </span>
        <span class="value origin-value" id="origin">—</span>
      </div>
      <div class="info-row">
        <span class="label">Scopes: </span>
        <span class="value" id="scopes">—</span>
      </div>
      <div class="info-row">
        <span class="label">Pairing ID: </span>
        <span class="value" id="pairingId" style="font-size:12px;color:#666;">—</span>
      </div>
    </div>

    <div class="buttons">
      <button class="btn-deny" id="denyBtn" onclick="respond('deny')">Deny</button>
      <button class="btn-approve" id="approveBtn" onclick="respond('approve')">Approve</button>
    </div>
    <div class="result" id="result"></div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const pairingId = params.get("pairingId");

    document.getElementById("pairingId").textContent = pairingId || "unknown";

    // Fetch session info
    if (pairingId) {
      fetch(`/pair/session?pairingId=${pairingId}`)
        .then(r => r.json())
        .then(data => {
          document.getElementById("origin").textContent = data.origin || "unknown";
          document.getElementById("scopes").textContent = (data.scopes || []).join(", ") || "none";
        })
        .catch(() => {
          document.getElementById("origin").textContent = "error loading";
        });
    }

    async function respond(action) {
      const approveBtn = document.getElementById("approveBtn");
      const denyBtn = document.getElementById("denyBtn");
      const resultEl = document.getElementById("result");
      approveBtn.disabled = true;
      denyBtn.disabled = true;

      try {
        const res = await fetch(`/pair/${action}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ pairingId }),
        });
        const data = await res.json();
        if (res.ok) {
          resultEl.className = action === "approve" ? "result success" : "result denied";
          resultEl.textContent = action === "approve"
            ? "Approved! You can close this tab."
            : "Denied. You can close this tab.";
        } else {
          resultEl.className = "result error";
          resultEl.textContent = data.error || "Something went wrong";
        }
      } catch (err) {
        resultEl.className = "result error";
        resultEl.textContent = "Network error";
      }
    }
  </script>
</body>
</html>
